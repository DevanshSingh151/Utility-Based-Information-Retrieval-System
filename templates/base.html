<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Utility Agent Demo</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-gradient" href="/">
                <i class="fa-solid fa-robot text-primary"></i> Adaptive Multi-Objective Utility Agent
            </a>
            <span class="navbar-text small text-muted ms-auto">
                VIT Chennai AI Semester Project (Mods 1, 5, 7)
            </span>
        </div>
    </nav>
    
    <main class="container py-5 content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto py-3 bg-black border-top border-secondary text-center text-muted small">
        <div class="container">
            Generated Hybrid Semantic Search Pipeline - 2026<br>
            Powered by Flask, Sentence-Transformers, and Bayesian Updates
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
